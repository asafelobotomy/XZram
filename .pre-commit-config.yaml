# Install: pip install pre-commit && pre-commit install
# Or: pacman -S pre-commit / apt install pre-commit (distro package)
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        language: system
        entry: cargo fmt --all -- --check
        pass_filenames: false
        types: [rust]
      - id: cargo-clippy
        name: cargo clippy -D warnings
        language: system
        entry: cargo clippy --all-targets -- -D warnings
        pass_filenames: false
        types: [rust]
      - id: cargo-test-lib
        name: cargo test -p xzram --lib
        language: system
        entry: cargo test -p xzram --lib
        pass_filenames: false
        types: [rust]
