name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release --verbose

  lint:
    name: Format and clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: LOC limit (400)
        run: ./scripts/check-loc.sh

  distro-matrix:
    name: Distro smoke test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora
            image: fedora:42
          - distro: ubuntu
            image: ubuntu:24.04
          - distro: debian
            image: debian:trixie
          - distro: arch
            image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test in container
        run: |
          docker run --rm \
            -v "$PWD:/src:ro" \
            -v "$PWD/scripts/ci-distro-smoke.sh:/ci-distro-smoke.sh:ro" \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/xzram-target \
            "${{ matrix.image }}" \
            bash /ci-distro-smoke.sh "${{ matrix.distro }}"

  debian-package:
    name: Debian package smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build Debian package
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -v "$PWD/scripts/ci-debian-package.sh:/ci-debian-package.sh:ro" \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/xzram-target \
            debian:trixie \
            bash /ci-debian-package.sh

  qt-gui:
    name: Build Qt GUI (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev qt6-base-dev-tools
          cmake -S gui -B build-gui
          cmake --build build-gui
        env:
          QT_QPA_PLATFORM: offscreen

      - name: GUI smoke
        run: make gui-smoke
        env:
          QT_QPA_PLATFORM: offscreen

  arch-package:
    name: Verify PKGBUILD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PKGBUILD syntax
        run: |
          grep -q '^pkgname=xzram' PKGBUILD
          grep -q '^pkgver=' PKGBUILD
          grep -q 'cargo build' PKGBUILD
