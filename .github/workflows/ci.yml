name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release --verbose

  lint:
    name: Format and clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: LOC limit (400)
        run: ./scripts/check-loc.sh

  distro-matrix:
    name: Distro smoke test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora-42, ubuntu-24.04, debian-13, archlinux]
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test in container
        run: |
          case "${{ matrix.distro }}" in
            fedora-42)
              docker run --rm -v "$PWD:/src:ro" fedora:42 bash -c "
                dnf install -y rust cargo polkit systemd util-linux &&
                cd /src && cargo build --release && cargo test
              "
              ;;
            ubuntu-24.04)
              docker run --rm -v "$PWD:/src:ro" ubuntu:24.04 bash -c "
                apt-get update &&
                apt-get install -y rustc cargo pkg-config libssl-dev polkitd systemd util-linux &&
                cd /src && cargo build --release && cargo test
              "
              ;;
            debian-13)
              docker run --rm -v "$PWD:/src:ro" debian:trixie bash -c "
                apt-get update &&
                apt-get install -y rustc cargo pkg-config libssl-dev polkitd systemd util-linux &&
                cd /src && cargo build --release && cargo test
              "
              ;;
            archlinux)
              docker run --rm -v "$PWD:/src:ro" archlinux:latest bash -c "
                pacman -Syu --noconfirm rust polkit systemd util-linux &&
                cd /src && cargo build --release && cargo test
              "
              ;;
          esac

  debian-package:
    name: Debian package smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Debian package
        run: |
          docker run --rm -v "$PWD:/src" debian:trixie bash -c "
            apt-get update &&
            apt-get install -y debhelper cargo rustc pkg-config libssl-dev &&
            cd /src &&
            dpkg-buildpackage -us -uc -b &&
            ls -la ../*.deb
          "

  qt-gui:
    name: Build Qt GUI (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev qt6-base-dev-tools
          cmake -S gui -B build-gui
          cmake --build build-gui
        env:
          QT_QPA_PLATFORM: offscreen

  arch-package:
    name: Verify PKGBUILD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PKGBUILD syntax
        run: |
          grep -q '^pkgname=xzram' PKGBUILD
          grep -q '^pkgver=' PKGBUILD
          grep -q 'cargo build' PKGBUILD
