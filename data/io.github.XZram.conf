<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="io.github.XZram1"/>
    <allow send_destination="io.github.XZram1"/>
  </policy>

  <policy context="default">
    <allow send_destination="io.github.XZram1"
           send_interface="io.github.XZram.Manager"/>
    <allow receive_sender="io.github.XZram1"/>
  </policy>
</busconfig>
